<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ski</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        font-family: system-ui, sans-serif;
        touch-action: none;
      }
      #hud {
        position: fixed;
        top: 12px;
        left: 16px;
        color: white;
        text-shadow: 0 1px 3px rgba(0, 0, 40, 0.6);
        font-size: 18px;
        line-height: 1.5;
        user-select: none;
      }
      #flowbar {
        width: 170px;
        height: 9px;
        margin-top: 4px;
        border-radius: 5px;
        background: rgba(10, 20, 50, 0.35);
        overflow: hidden;
      }
      #flowfill {
        height: 100%;
        width: 0;
        border-radius: 5px;
        transition: width 80ms linear;
      }
      #overlay {
        position: fixed;
        top: 20%;
        left: 0;
        right: 0;
        display: none;
        justify-content: center;
        color: white;
        text-shadow: 0 2px 6px rgba(0, 0, 40, 0.8);
        font-size: 42px;
        font-style: italic;
        user-select: none;
        pointer-events: none;
      }
      #overlay.visible {
        display: flex;
      }
    </style>
  </head>
  <body>
    <div id="hud">
      <div id="stats"></div>
      <div id="flowbar"><div id="flowfill"></div></div>
    </div>
    <div id="overlay">Wipeout!</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
